<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cametá Urban Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map-screen">
        <h1>Cametá: Escolha o Ponto de Partida</h1>
        <div class="map-container">
            <button class="loc-btn" onclick="startGame('Orla de Cametá')">Orla de Cametá</button>
            <button class="loc-btn" onclick="startGame('Centro Histórico')">Centro Histórico</button>
            <button class="loc-btn" onclick="startGame('Bairro da Aldeia')">Bairro da Aldeia</button>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <div id="ui">Explorando: <span id="current-loc"></span></div>
        <canvas id="gameCanvas"></canvas>
        <button onclick="location.reload()" id="back-btn">Voltar ao Mapa</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
