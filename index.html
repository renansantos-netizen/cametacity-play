<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cametá Urban Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map-screen">
        <div class="header-container">
            <h1>Cametá Urban Explorer</h1>
            <p>Escolha seu ponto de partida</p>
        </div>
        <div class="map-container">
            <button class="loc-btn" onclick="startGame('Orla de Cametá')">Orla de Cametá</button>
            <button class="loc-btn" onclick="startGame('Centro Histórico')">Centro Histórico</button>
            <button class="loc-btn" onclick="startGame('Bairro da Aldeia')">Bairro da Aldeia</button>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <div id="ui">
            Explorando: <span id="current-loc"></span>
            <button onclick="location.reload()" id="back-btn">Voltar ao Mapa</button>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
