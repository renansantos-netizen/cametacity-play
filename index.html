<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cametá City Play - Edição Bonita</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-ui">
        <h1>Conectando Cametá</h1>
        <p>Pontos: <span id="score">0</span></p>
    </div>
    
    <div id="map-screen">
        <h2>Selecione onde iniciar em Cametá</h2>
        <div class="map-container">
            <button class="loc" onclick="startGame('Orla de Cametá')">Orla de Cametá</button>
            <button class="loc" onclick="startGame('Centro Histórico')">Centro Histórico</button>
            <button class="loc" onclick="startGame('Bairro da Aldeia')">Bairro da Aldeia</button>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <canvas id="gameCanvas"></canvas>
    </div>
    <script src="script.js"></script>
</body>
</html>
